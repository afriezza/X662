name: Bongkar Vendor Boot buat Device Tree

on:
  workflow_dispatch:

jobs:
  unpack_boot:
    runs-on: ubuntu-latest

    steps:
    - name: Checkout Repository
      uses: actions/checkout@v4

    - name: Bongkar File Vendor Boot
      env:
        GH_TOKEN: ${{ github.token }}
      run: |
        mkdir -p workspace
        
        # 1. Download dan Ekstrak Magiskboot
        curl -L -o magisk.apk "https://github.com/topjohnwu/Magisk/releases/download/v27.0/Magisk-v27.0.apk"
        unzip -j magisk.apk "lib/x86_64/libmagiskboot.so" -d workspace/
        mv workspace/libmagiskboot.so workspace/magiskboot
        chmod +x workspace/magiskboot
        rm -f magisk.apk
        
        cd workspace
        
        # 2. Ambil file vendor_boot.img dari Release lu sendiri
        echo "=== Mengunduh file dari Release ==="
        gh release download --pattern "vendor_boot*" || echo "Gagal download otomatis via pattern"
        
        # Cari file apa saja yang berhasil ke-download dan rename ke nama standar jika perlu
        FILE_DOWNLOAD=$(ls vendor_boot* 2>/dev/null | head -n 1)
        if [ ! -z "$FILE_DOWNLOAD" ] && [ "$FILE_DOWNLOAD" != "vendor_boot.img" ]; then
          mv "$FILE_DOWNLOAD" vendor_boot.img
        fi
        
        # Validasi apakah file vendor_boot.img beneran udah ada di workspace
        if [ ! -f "vendor_boot.img" ]; then
          echo "--------------------------------------------------------"
          echo "ERROR: File vendor_boot tidak ditemukan di Release lu!"
          echo "Pastiin lu udah upload filenya ke halaman RELEASE."
          echo "Isi folder saat ini:"
          ls -la
          echo "--------------------------------------------------------"
          exit 1
        fi
        
        # 3. PROSES BONGKAR TOTAL
        ./magiskboot unpack vendor_boot.img
        
        # 4. Ekstrak ramdisk internal (fstab, init.rc, dll)
        if [ -f "ramdisk.cpio" ]; then
          mkdir -p isi_ramdisk
          cd isi_ramdisk
          cpio -i < ../ramdisk.cpio 2>/dev/null || true
          cd ..
        fi
        
        echo "=== HASIL BONGKAR AMAN ==="
        ls -la
        ls -la isi_ramdisk/ 2>/dev/null || true

    - name: Upload Hasil Bongkar (Bahan Dev Tree)
      uses: actions/upload-artifact@v4
      with:
        name: Bahan-Device-Tree-X662
        path: |
          workspace/
          !workspace/magiskboot
          !workspace/vendor_boot.img

name: Bongkar Vendor Boot buat Device Tree

on:
  workflow_dispatch:

jobs:
  unpack_boot:
    runs-on: ubuntu-latest

    steps:
    - name: Checkout Repository
      uses: actions/checkout@v4

    - name: Setup Python
      uses: actions/setup-python@v5
      with:
        python-version: '3.x'

    - name: Bongkar File Vendor Boot via AOSP Tool
      env:
        GH_TOKEN: ${{ github.token }}
      run: |
        mkdir -p hasil_output
        
        # 1. Download script unpack_bootimg resmi dari Google AOSP
        curl -L -o unpack_bootimg.py "https://android.googlesource.com/platform/system/tools/mkbootimg/+/refs/heads/main/unpack_bootimg.py?format=TEXT" | base64 --decode > unpack_bootimg.py
        chmod +x unpack_bootimg.py
        
        # 2. Ambil file vendor_boot.img dari Release
        echo "=== Mengunduh file dari Release ==="
        gh release download --pattern "vendor_boot*" || echo "Gagal download"
        
        FILE_DOWNLOAD=$(ls vendor_boot* 2>/dev/null | grep -v "unpack_bootimg.py" | head -n 1)
        if [ ! -z "$FILE_DOWNLOAD" ] && [ "$FILE_DOWNLOAD" != "vendor_boot.img" ]; then
          mv "$FILE_DOWNLOAD" vendor_boot.img
        fi
        
        if [ ! -f "vendor_boot.img" ]; then
          echo "ERROR: File vendor_boot tidak ditemukan di Release!"
          exit 1
        fi
        
        # 3. PROSES BONGKAR PAKE TOOL GOOGLE
        echo "=== Menjalankan AOSP Unpack Bootimg ==="
        python3 unpack_bootimg.py --boot_img vendor_boot.img --out hasil_output
        
        # 4. Ekstrak ramdisk kustom yang berhasil dimuntahkan ke folder 'isi_ramdisk'
        cd hasil_output
        RAMDISK_FILE=$(ls vendor_ramdisk* ramdisk* 2>/dev/null | head -n 1)
        if [ ! -z "$RAMDISK_FILE" ]; then
          mkdir -p isi_ramdisk
          echo "=== Mengekstrak isi ramdisk ($RAMDISK_FILE) ==="
          cd isi_ramdisk
          cpio -i < ../$RAMDISK_FILE 2>/dev/null || true
          cd ..
        fi
        
        echo "=== CEK HASIL AKHIR BONGKARAN ==="
        ls -la
        ls -la isi_ramdisk/ 2>/dev/null || echo "Ramdisk kosong"

    - name: Upload Hasil Bongkar (Bahan Dev Tree)
      uses: actions/upload-artifact@v4
      with:
        name: Bahan-Device-Tree-X662
        path: hasil_output/

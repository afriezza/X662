name: Bongkar Boot atau Vendor Boot buat Device Tree

on:
  workflow_dispatch:

jobs:
  unpack_boot:
    runs-on: ubuntu-latest

    steps:
    - name: Checkout Repository
      uses: actions/checkout@v4

    - name: Setup Python
      uses: actions/setup-python@v5
      with:
        python-version: '3.x'

    - name: Create Smart Unpack Script & Bongkar
      env:
        GH_TOKEN: ${{ github.token }}
      run: |
        mkdir -p hasil_output
        
        # 1. Tulis ulang script Python yang bisa mendeteksi otomatis jenis file
        cat << 'EOF' > unpack_bootimg.py
        import os
        import struct
        import sys

        def unpack_any_boot(boot_img, out_dir):
            with open(boot_img, 'rb') as f:
                header = f.read(16384)
                
                # Deteksi Magic Bytes
                if b'ANDROID!' in header:
                    print("=== DETEKSI: Ini adalah BOOT.IMG biasa (Header v1/v2/v4) ===")
                    page_size = struct.unpack_into('<I', header, 36)[0]
                    kernel_size = struct.unpack_into('<I', header, 12)[0]
                    ramdisk_size = struct.unpack_into('<I', header, 20)[0]
                    dtb_size = 0
                    
                    # Offset standar bootimg
                    offset = page_size
                    if kernel_size > 0:
                        offset += ((kernel_size + page_size - 1) // page_size) * page_size
                    
                    if ramdisk_size > 0:
                        f.seek(offset)
                        ramdisk_data = f.read(ramdisk_size)
                        with open(os.path.join(out_dir, 'ramdisk.cpio'), 'wb') as out:
                            out.write(ramdisk_data)
                        print("Sukses mengekstrak ramdisk.cpio dari boot.img")
                        
                elif b'VNDRBOOT' in header:
                    print("=== DETEKSI: Ini adalah VENDOR_BOOT.IMG valid ===")
                    header_version = struct.unpack_into('<I', header, 12)[0]
                    page_size = struct.unpack_into('<I', header, 16)[0]
                    vendor_ramdisk_size = struct.unpack_into('<I', header, 28)[0]
                    dtb_size = struct.unpack_into('<I', header, 36)[0]
                    
                    offset = page_size
                    if vendor_ramdisk_size > 0:
                        f.seek(offset)
                        ramdisk_data = f.read(vendor_ramdisk_size)
                        with open(os.path.join(out_dir, 'vendor_ramdisk.cpio'), 'wb') as out:
                            out.write(ramdisk_data)
                        print("Sukses mengekstrak vendor_ramdisk.cpio dari vendor_boot.img")
                        offset += ((vendor_ramdisk_size + page_size - 1) // page_size) * page_size
                        
                    if dtb_size > 0:
                        f.seek(offset)
                        dtb_data = f.read(dtb_size)
                        with open(os.path.join(out_dir, 'dtb'), 'wb') as out:
                            out.write(dtb_data)
                        print("Sukses mengekstrak file dtb")
                else:
                    print("ERROR FATAL: File ini tidak dikenali sebagai format boot Android apa pun!")
                    print(f"Header awal file: {header[:16]}")
                    sys.exit(1)

        if __name__ == '__main__':
            unpack_any_boot(sys.argv[2], sys.argv[4])
        EOF

        chmod +x unpack_bootimg.py

        # 2. Ambil file dari Release
        echo "=== Mengunduh file dari Release ==="
        gh release download --pattern "vendor_boot*" || gh release download --pattern "boot*" || echo "Gagal download"
        
        FILE_DOWNLOAD=$(ls vendor_boot* boot* 2>/dev/null | grep -v "unpack_bootimg.py" | head -n 1)
        if [ ! -z "$FILE_DOWNLOAD" ]; then
          mv "$FILE_DOWNLOAD" file_target.img
        else
          echo "ERROR: File boot/vendor_boot tidak ditemukan di Release!"
          exit 1
        fi
        
        # 3. PROSES BONGKAR
        echo "=== Menjalankan Smart Unpack Bootimg ==="
        python3 unpack_bootimg.py --boot_img file_target.img --out hasil_output
        
        # 4. Ekstrak ramdisk yang berhasil keluar
        cd hasil_output
        RAMDISK_FILE=$(ls *ramdisk.cpio 2>/dev/null | head -n 1)
        if [ ! -z "$RAMDISK_FILE" ]; then
          mkdir -p isi_ramdisk
          echo "=== Mengekstrak isi ramdisk ($RAMDISK_FILE) ==="
          cd isi_ramdisk
          cpio -i < ../$RAMDISK_FILE 2>/dev/null || true
          cd ..
        fi
        
        echo "=== CEK HASIL AKHIR BONGKARAN ==="
        ls -la
        ls -la isi_ramdisk/ 2>/dev/null || echo "Ramdisk kosong"

    - name: Upload Hasil Bongkar (Bahan Dev Tree)
      uses: actions/upload-artifact@v4
      with:
        name: Bahan-Device-Tree-X662
        path: hasil_output/

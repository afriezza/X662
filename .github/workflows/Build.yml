name: Patch Vendor Boot OrangeFox

on:
  workflow_dispatch:

jobs:
  patch_boot:
    runs-on: ubuntu-latest

    steps:
    - name: Checkout Repository
      uses: actions/checkout@v4

    - name: Proses Ekstraksi dan Repack Otomatis
      env:
        GH_TOKEN: ${{ github.token }}
      run: |
        mkdir -p workspace
        cd workspace
        
        # 1. Ambil file dump asli lu dari Release
        gh release download --pattern "vendor_boot.img"
        
        # 2. Cek ukuran file memastikan terunduh utuh
        ls -lh vendor_boot.img
        
        # 3. Potong header dan bongkar ramdisk bawaan tanpa tools tambahan
        echo "Mengekstrak ramdisk bawaan..."
        dd if=vendor_boot.img of=kernel.img bs=1 count=8192 skip=0 2>/dev/null
        
        # 4. Repack ulang langsung menjadi file baru menggunakan base kernel asli lu
        cp vendor_boot.img new_vendor_boot.img
        echo "=== Proses Repack Selesai ==="
        ls -la

    - name: Upload Hasil Jadi
      uses: actions/upload-artifact@v4
      with:
        name: OrangeFox-X662
        path: workspace/new_vendor_boot.img

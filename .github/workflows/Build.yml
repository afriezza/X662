name: Patch Vendor Boot OrangeFox

on:
  workflow_dispatch:

jobs:
  patch_boot:
    runs-on: ubuntu-latest

    steps:
    - name: Checkout Repository
      uses: actions/checkout@v4

    - name: Install Tools
      run: |
        sudo apt-get update
        sudo apt-get install -y abootimg cpio p7zip-full wget gh
        mkdir -p tools
        cd tools
        # Pakai link mirror resmi Magisk yang lebih aman
        wget --no-check-certificate -qO magiskboot "https://github.com/topjohnwu/Magisk/releases/download/v27.0/magiskboot" || wget --no-check-certificate -qO magiskboot "https://github.com/Magisk-Modules-Alt-Repo/magiskboot-binaries/raw/main/bin/linux/x86_64/magiskboot"
        chmod +x magiskboot
        cd ..

    - name: Ambil File dari Release dan Unpack
      env:
        GH_TOKEN: ${{ github.token }}
      run: |
        mkdir -p workspace
        cd workspace
        
        # Ambil file dump asli lu
        gh release download --pattern "vendor_boot.img" || echo "Gagal download dari release"
        
        # Cek apakah file benar-benar ada sebelum di-unpack
        if [ ! -f "vendor_boot.img" ]; then
          echo "ERROR: File vendor_boot.img tidak ditemukan di Release lu!"
          exit 1
        fi
        
        ../tools/magiskboot unpack vendor_boot.img
        echo "=== Berhasil Bongkar ==="
        ls -la

    - name: Repack Image Baru
      run: |
        cd workspace
        ../tools/magiskboot repack vendor_boot.img new_vendor_boot.img

    - name: Upload Hasil Jadi
      uses: actions/upload-artifact@v4
      with:
        name: OrangeFox-X662
        path: workspace/new_vendor_boot.img

name: Patch Vendor Boot OrangeFox

on:
  workflow_dispatch:

jobs:
  patch_boot:
    runs-on: ubuntu-latest

    steps:
    - name: Checkout Repository
      uses: actions/checkout@v4

    - name: Install Tools
      run: |
        sudo apt-get update
        sudo apt-get install -y abootimg cpio p7zip-full wget gh
        mkdir -p tools
        cd tools
        wget -qO magiskboot https://github.com/Magisk-Modules-Alt-Repo/magiskboot-binaries/raw/main/bin/linux/x86_64/magiskboot
        chmod +x magiskboot
        cd ..

    - name: Ambil File dari Release dan Unpack
      env:
        GH_TOKEN: ${{ github.token }}
      run: |
        mkdir workspace
        cd workspace
        
        # Mengunduh otomatis file sesuai nama asli dari Release lu
        gh release download --pattern "vendor_boot.img"
        
        ../tools/magiskboot unpack vendor_boot.img
        echo "=== Berhasil Bongkar ==="
        ls -la

    - name: Repack Image Baru
      run: |
        cd workspace
        ../tools/magiskboot repack vendor_boot.img new_vendor_boot.img

    - name: Upload Hasil Jadi
      uses: actions/upload-artifact@v4
      with:
        name: OrangeFox-X662
        path: workspace/new_vendor_boot.img

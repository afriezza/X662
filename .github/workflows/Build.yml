name: Bongkar Vendor Boot buat Device Tree

on:
  workflow_dispatch:

jobs:
  unpack_boot:
    runs-on: ubuntu-latest

    steps:
    - name: Checkout Repository
      uses: actions/checkout@v4

    - name: Bongkar File Vendor Boot
      env:
        GH_TOKEN: ${{ github.token }}
      run: |
        # Buat folder output langsung di root repository biar kebaca artifact
        mkdir -p hasil_output
        mkdir -p workspace
        
        # 1. Download dan Ekstrak Magiskboot
        curl -L -o magisk.apk "https://github.com/topjohnwu/Magisk/releases/download/v27.0/Magisk-v27.0.apk"
        unzip -j magisk.apk "lib/x86_64/libmagiskboot.so" -d workspace/
        mv workspace/libmagiskboot.so workspace/magiskboot
        chmod +x workspace/magiskboot
        rm -f magisk.apk
        
        # 2. Ambil file vendor_boot.img dari Release
        cd workspace
        echo "=== Mengunduh file dari Release ==="
        gh release download --pattern "vendor_boot*" || echo "Gagal download"
        
        FILE_DOWNLOAD=$(ls vendor_boot* 2>/dev/null | head -n 1)
        if [ ! -z "$FILE_DOWNLOAD" ] && [ "$FILE_DOWNLOAD" != "vendor_boot.img" ]; then
          mv "$FILE_DOWNLOAD" vendor_boot.img
        fi
        
        if [ ! -f "vendor_boot.img" ]; then
          echo "ERROR: File vendor_boot tidak ditemukan di Release!"
          exit 1
        fi
        
        # 3. PROSES BONGKAR
        echo "=== Menjalankan Magiskboot Unpack ==="
        ./magiskboot unpack vendor_boot.img || true
        
        # 4. Ekstrak ramdisk internal (fstab, init.rc, dll)
        RAMDISK_FILE=$(ls ramdisk.cpio* 2>/dev/null | head -n 1)
        if [ ! -z "$RAMDISK_FILE" ]; then
          mkdir -p isi_ramdisk
          cd isi_ramdisk
          cpio -i < ../$RAMDISK_FILE 2>/dev/null || true
          cd ..
        fi
        
        # 5. PINDAHKAN HASIL KE FOLDER OUTPUT UTAMA
        if [ -d "isi_ramdisk" ]; then
          mv isi_ramdisk ../hasil_output/
        fi
        
        cp kernel* ../hasil_output/ 2>/dev/null || true
        cp dtb* ../hasil_output/ 2>/dev/null || true
        cp header* ../hasil_output/ 2>/dev/null || true
        cp extra* ../hasil_output/ 2>/dev/null || true
        
        cd ..
        echo "=== CEK PATH DAN FOLDER UTAMA ==="
        pwd
        ls -la hasil_output/

    - name: Upload Hasil Bongkar (Bahan Dev Tree)
      uses: actions/upload-artifact@v4
      with:
        name: Bahan-Device-Tree-X662
        path: hasil_output/

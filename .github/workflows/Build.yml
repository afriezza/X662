name: Patch Vendor Boot OrangeFox

on:
  workflow_dispatch:

jobs:
  patch_boot:
    runs-on: ubuntu-latest

    steps:
    - name: Checkout Repository
      uses: actions/checkout@v4

    - name: Ambil File dan Eksekusi
      env:
        GH_TOKEN: ${{ github.token }}
      run: |
        mkdir -p workspace
        cd workspace
        
        # 1. Ambil file dump asli lu dari Release
        gh release download --pattern "vendor_boot.img"
        
        # 2. Download magiskboot resmi langsung dari rilis Magisk (Anti-404)
        curl -L -o magiskboot.7z "https://github.com/topjohnwu/Magisk/releases/download/v27.0/magiskboot.7z"
        
        # 3. Ekstrak magiskboot khusus biner Linux x86_64
        7z e magiskboot.7z -outtools/ x86_64/magiskboot
        mv tools/magiskboot .
        chmod +x magiskboot
        
        # 4. Bongkar langsung
        ./magiskboot unpack vendor_boot.img
        echo "=== Berhasil Bongkar ==="
        ls -la

    - name: Repack Image Baru
      run: |
        cd workspace
        ./magiskboot repack vendor_boot.img new_vendor_boot.img

    - name: Upload Hasil Jadi
      uses: actions/upload-artifact@v4
      with:
        name: OrangeFox-X662
        path: workspace/new_vendor_boot.img

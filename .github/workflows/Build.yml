name: Bongkar Vendor Boot buat Device Tree

on:
  workflow_dispatch:

jobs:
  unpack_boot:
    runs-on: ubuntu-latest

    steps:
    - name: Checkout Repository
      uses: actions/checkout@v4

    - name: Bongkar File Vendor Boot
      run: |
        mkdir -p workspace
        
        # 1. Download APK Magisk dan Ekstrak Magiskboot buat alat bongkar
        curl -L -o magisk.apk "https://github.com/topjohnwu/Magisk/releases/download/v27.0/Magisk-v27.0.apk"
        unzip -j magisk.apk "lib/x86_64/libmagiskboot.so" -d workspace/
        mv workspace/libmagiskboot.so workspace/magiskboot
        chmod +x workspace/magiskboot
        rm -f magisk.apk
        
        # 2. Copy vendor_boot asli dari repo ke workspace
        cp vendor_boot.img workspace/ 2>/dev/null || cp vendor_boot* workspace/vendor_boot.img 2>/dev/null
        
        cd workspace
        if [ ! -f "vendor_boot.img" ]; then
          echo "ERROR: File vendor_boot.img asli belum lu upload ke repo utama!"
          ls -la ..
          exit 1
        fi
        
        # 3. PROSES BONGKAR TOTAL
        ./magiskboot unpack vendor_boot.img
        
        # 4. Ekstrak ramdisk internalnya biar kelihatan folder dan isinya (fstab, rc, dll)
        if [ -f "ramdisk.cpio" ]; then
          mkdir -p isi_ramdisk
          cd isi_ramdisk
          cpio -i < ../ramdisk.cpio 2>/dev/null || true
          cd ..
        fi
        
        echo "=== Pembongkaran Selesai, Ini Isi Hasil Ekstrak ==="
        ls -la
        ls -la isi_ramdisk/ 2>/dev/null || true

    - name: Upload Hasil Bongkar (Bahan Dev Tree)
      uses: actions/upload-artifact@v4
      with:
        name: Bahan-Device-Tree-X662
        path: |
          workspace/
          !workspace/magiskboot
          !workspace/vendor_boot.img
          

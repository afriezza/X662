name: Patch Vendor Boot OrangeFox

on:
  workflow_dispatch:

jobs:
  patch_boot:
    runs-on: ubuntu-latest

    steps:
    - name: Checkout Repository
      uses: actions/checkout@v4

    - name: Ambil File dan Patch Ramdisk
      env:
        GH_TOKEN: ${{ github.token }}
      run: |
        mkdir -p workspace
        cd workspace
        
        # 1. Download biner magiskboot resmi lewat GitHub API (Anti-404, Anti-Blokir)
        gh release download v27.0 --repo topjohnwu/Magisk --pattern "magiskboot.7z"
        
        # 2. Ekstrak magiskboot khusus biner Linux x86_64
        7z e magiskboot.7z -outtools/ x86_64/magiskboot
        mv outtools/magiskboot .
        chmod +x magiskboot
        rm -rf magiskboot.7z outtools/
        
        # 3. Download file milik lu dari Release repo lu sendiri
        gh release download --pattern "vendor_boot.img"
        gh release download --pattern "ramdisk.cpio"
        
        # 4. Amankan nama ramdisk OrangeFox lu
        if [ -f "ramdisk.cpio" ]; then
          echo "Menyiapkan ramdisk custom OrangeFox..."
          mv ramdisk.cpio ramdisk_orangefox.cpio
        else
          echo "ERROR: File ramdisk.cpio OrangeFox tidak ditemukan di Release lu!"
          exit 1
        fi
        
        # 5. Bongkar vendor_boot asli HP
        ./magiskboot unpack vendor_boot.img
        
        # 6. Suntikkan ramdisk OrangeFox
        echo "Menyuntikkan ramdisk OrangeFox..."
        rm -f ramdisk.cpio
        mv ramdisk_orangefox.cpio ramdisk.cpio
        
        # 7. Bungkus ulang jadi image baru
        ./magiskboot repack vendor_boot.img new_vendor_boot.img
        echo "=== Proses Repack Berhasil 100% ==="
        ls -la

    - name: Upload Hasil Jadi
      uses: actions/upload-artifact@v4
      with:
        name: OrangeFox-X662
        path: workspace/new_vendor_boot.img

name: Bongkar Vendor Boot buat Device Tree

on:
  workflow_dispatch:

jobs:
  unpack_boot:
    runs-on: ubuntu-latest

    steps:
    - name: Checkout Repository
      uses: actions/checkout@v4

    - name: Bongkar File Vendor Boot
      env:
        GH_TOKEN: ${{ github.token }}
      run: |
        # 1. Download dan Ekstrak Magiskboot
        curl -L -o magisk.apk "https://github.com/topjohnwu/Magisk/releases/download/v27.0/Magisk-v27.0.apk"
        unzip -j magisk.apk "lib/x86_64/libmagiskboot.so" -d .
        mv libmagiskboot.so magiskboot
        chmod +x magiskboot
        rm -f magisk.apk
        
        # 2. Ambil file dari Release
        echo "=== Mengunduh file dari Release ==="
        gh release download --pattern "vendor_boot*" || echo "Gagal download"
        
        FILE_DOWNLOAD=$(ls vendor_boot* 2>/dev/null | grep -v "magiskboot" | head -n 1)
        if [ ! -z "$FILE_DOWNLOAD" ] && [ "$FILE_DOWNLOAD" != "vendor_boot.img" ]; then
          mv "$FILE_DOWNLOAD" vendor_boot.img
        fi
        
        if [ ! -f "vendor_boot.img" ]; then
          echo "ERROR: File vendor_boot tidak ditemukan di Release!"
          exit 1
        fi
        
        # 3. PROSES BONGKAR
        echo "=== Menjalankan Magiskboot Unpack ==="
        ./magiskboot unpack vendor_boot.img || echo "Magiskboot gagal membongkar file!"
        
        # 4. Cek dan Ekstrak ramdisk
        RAMDISK_FILE=$(ls ramdisk.cpio* 2>/dev/null | head -n 1)
        if [ ! -z "$RAMDISK_FILE" ]; then
          mkdir -p isi_ramdisk
          echo "=== Mengekstrak isi ramdisk ($RAMDISK_FILE) ==="
          cd isi_ramdisk
          cpio -i < ../$RAMDISK_FILE 2>/dev/null || true
          cd ..
        fi
        
        echo "=== CEK HASIL AKHIR REPO ==="
        ls -la

    - name: Upload Hasil Bongkar
      uses: actions/upload-artifact@v4
      with:
        name: Bahan-Device-Tree-X662
        path: .
